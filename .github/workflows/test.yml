# SuperNovae CLI Test Workflow
# Runs on every push and PR to main
name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Main test job with default features
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Note: Windows not yet supported (daemon uses Unix sockets)
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # MSRV (Minimum Supported Rust Version) check
  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --workspace

  # Security audit - check for known vulnerabilities
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: |
          # Ignore RUSTSEC-2024-0384: instant is unmaintained (transitive via reqwest-retry)
          # Not a security vulnerability, just unmaintained
          cargo audit --deny warnings --ignore RUSTSEC-2024-0384

  # Feature flag matrix tests
  feature-matrix:
    name: Features (${{ matrix.crate }}/${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # spn-cli with docker feature (no OS keychain)
          - crate: spn-cli
            features: docker
            package: spn-cli
          # spn-cli with no default features
          - crate: spn-cli
            features: ""
            package: spn-cli
          # spn-keyring without os-keychain (env vars only)
          - crate: spn-keyring
            features: ""
            package: spn-keyring
          # spn-core with serde
          - crate: spn-core
            features: serde
            package: spn-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build -p ${{ matrix.package }} --no-default-features
          else
            cargo build -p ${{ matrix.package }} --no-default-features --features ${{ matrix.features }}
          fi

      - name: Test with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test -p ${{ matrix.package }} --no-default-features
          else
            cargo test -p ${{ matrix.package }} --no-default-features --features ${{ matrix.features }}
          fi

