# release-plz workflow
# Automates version bumping, CHANGELOG generation, and release PRs
#
# Flow:
#   push to main → creates/updates Release PR
#   merge Release PR → creates git tag → triggers release.yml
#
# Documentation: https://release-plz.ieni.dev/docs/github

name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release (tag + publish)'
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # =============================================================================
  # Validation - Run before creating release PR
  # =============================================================================
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Check semver compatibility
        run: cargo semver-checks check-release
        continue-on-error: true

  # =============================================================================
  # Release PR - Creates/updates PR with version bumps and CHANGELOG
  # =============================================================================
  release-plz-pr:
    name: Create Release PR
    needs: validate
    runs-on: ubuntu-latest
    # Only run on push to main, not on workflow_dispatch with release=true
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.release)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # =============================================================================
  # Release - Triggered when release PR is merged (or manual dispatch)
  # =============================================================================
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    # Only run on manual dispatch with release=true
    if: github.event_name == 'workflow_dispatch' && inputs.release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Run release-plz release
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
