# SuperNovae CLI Release Workflow
# Triggered on tag push (v*), builds cross-platform binaries and updates Homebrew formula
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.14.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Support both tag push and workflow_dispatch triggers
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # === Native targets (full features, for Homebrew/GitHub Releases) ===
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # === Docker targets (musl static, no keychain) ===
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            docker: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            docker: true
            cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !matrix.docker
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install musl tools
        if: matrix.docker && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native, full features)
        if: "!matrix.cross && !matrix.docker"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (native, docker features)
        if: "!matrix.cross && matrix.docker"
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features docker

      - name: Build (cross, full features)
        if: matrix.cross && !matrix.docker
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cross, docker features)
        if: matrix.cross && matrix.docker
        run: cross build --release --target ${{ matrix.target }} --no-default-features --features docker

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf spn-${{ matrix.target }}.tar.gz spn
          shasum -a 256 spn-${{ matrix.target }}.tar.gz > spn-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spn-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/spn-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/spn-${{ matrix.target }}.tar.gz.sha256

  docker-publish:
    name: Publish Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download Linux amd64 artifact (musl static)
        uses: actions/download-artifact@v4
        with:
          name: spn-x86_64-unknown-linux-musl
          path: artifacts/amd64

      - name: Download Linux arm64 artifact (musl static)
        uses: actions/download-artifact@v4
        with:
          name: spn-aarch64-unknown-linux-musl
          path: artifacts/arm64

      - name: Extract binaries for Docker
        run: |
          mkdir -p docker-context/amd64 docker-context/arm64
          tar -xzf artifacts/amd64/spn-x86_64-unknown-linux-musl.tar.gz -C docker-context/amd64
          tar -xzf artifacts/arm64/spn-aarch64-unknown-linux-musl.tar.gz -C docker-context/arm64
          chmod +x docker-context/*/spn
          # Verify static linking
          file docker-context/amd64/spn
          ls -la docker-context/*/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/supernovae-st/spn
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/supernovae-st/spn
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    name: Create Release
    needs: [build, docker-publish]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spn-*
          path: artifacts
          merge-multiple: false

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/spn-*/spn-*.tar.gz
            artifacts/spn-*/spn-*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Publish spn-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p spn-client --token "$CARGO_REGISTRY_TOKEN"
        continue-on-error: true

      - name: Publish spn-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p spn-cli --token "$CARGO_REGISTRY_TOKEN"
        continue-on-error: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: spn
          homebrew-tap: supernovae-st/homebrew-tap
          download-url: https://github.com/supernovae-st/supernovae-cli/releases/download/${{ env.RELEASE_TAG }}/spn-x86_64-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
