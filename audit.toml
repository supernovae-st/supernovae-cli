# cargo-audit configuration
# https://rustsec.org/

[advisories]
# Ignore unmaintained advisories for transitive dependencies
# These are not security vulnerabilities, just maintenance warnings
ignore = [
    # instant 0.1.13 is unmaintained (via reqwest-retry -> wasm-timer -> parking_lot)
    # Not a security issue, just unmaintained. Tracked upstream.
    "RUSTSEC-2024-0384",
]
